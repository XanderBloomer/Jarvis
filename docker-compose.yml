services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: porchester
      POSTGRES_PASSWORD: porchester
      POSTGRES_DB: porchester
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U porchester"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://porchester:porchester@db:5432/porchester
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-JustinA1945}
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma
      - ./public:/app/public
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
